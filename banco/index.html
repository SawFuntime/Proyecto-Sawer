<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <link rel="icon" type="image/png" href="../Inquisitor.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Banco | Proyecto Sawer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f0f11;
            color: #e5e5e5;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f0f11; }
        ::-webkit-scrollbar-thumb { background: #991b1b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #dc2626; }

        .glow-red { text-shadow: 0 0 15px rgba(220, 38, 38, 0.5); }
        .glow-gold { text-shadow: 0 0 20px rgba(234, 179, 8, 0.6); }
    </style>
</head>
<body class="font-sans antialiased selection:bg-red-800 selection:text-white pt-24">

    <nav class="fixed top-0 left-0 w-full z-40 bg-[#0f0f11]/90 backdrop-blur-md border-b border-zinc-800 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                
                <div class="flex items-center gap-3">
                    <img src="../Inquisitor.png" alt="Logo Proyecto Sawer" class="w-10 h-10 object-contain drop-shadow-[0_0_5px_rgba(220,38,38,0.5)]" onerror="this.onerror=null; this.src='https://raw.githubusercontent.com/SawFuntime/Proyecto-Sawer/main/Inquisitor.png';">
                    <span class="font-black text-xl tracking-widest uppercase text-white glow-red hidden sm:block">Proyecto Sawer</span>
                    <span class="font-bold text-red-500 uppercase tracking-widest text-sm ml-2 border-l border-zinc-700 pl-2">Banco</span>
                </div>

                <div>
                    <a href="../" class="flex items-center bg-zinc-900 hover:bg-zinc-800 text-zinc-300 hover:text-white border border-zinc-700 font-bold py-2 px-4 rounded-md transition-colors text-sm uppercase tracking-wider shadow-md group">
                        <svg class="w-5 h-5 mr-2 text-zinc-500 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Volver al Menú
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10" data-aos="fade-up" data-aos-duration="800">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-white uppercase tracking-wider mb-2">Finanzas Personales</h1>
            <div class="w-24 h-1 bg-red-600 mx-auto rounded-full shadow-[0_0_10px_rgba(220,38,38,0.5)]"></div>
        </div>

        <div class="bg-zinc-900/80 rounded-xl border border-zinc-800 p-8 shadow-2xl relative overflow-hidden flex flex-col md:flex-row items-center gap-8">
            <div class="absolute -right-20 -top-20 w-64 h-64 bg-yellow-500/10 rounded-full blur-[80px] pointer-events-none"></div>

            <div class="flex flex-col items-center text-center md:text-left md:items-start md:w-1/3 z-10">
                <div class="relative mb-4 group">
                    <img id="bank-user-avatar" src="../Inquisitor.png" alt="Foto de perfil" class="w-28 h-28 rounded-full object-cover border-4 border-zinc-800 shadow-[0_0_20px_rgba(0,0,0,0.5)] transition-colors group-hover:border-red-600" onerror="this.onerror=null; this.src='https://raw.githubusercontent.com/SawFuntime/Proyecto-Sawer/main/Inquisitor.png';">
                </div>
                <h2 id="bank-user-name" class="text-2xl font-black text-white uppercase tracking-wider break-words w-full">Cargando...</h2>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mt-1">Cuenta Vinculada</p>
            </div>

            <div class="hidden md:block w-px h-32 bg-gradient-to-b from-transparent via-zinc-700 to-transparent"></div>
            <div class="md:hidden w-full h-px bg-gradient-to-r from-transparent via-zinc-700 to-transparent"></div>

            <div class="flex-1 w-full z-10 flex flex-col justify-center">
                <h3 class="text-zinc-400 font-bold uppercase tracking-widest text-sm mb-3 ml-1 flex items-center gap-2">
                    <svg class="w-4 h-4 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.64-2.25 1.64-1.74 0-2.1-.96-2.18-1.66H8.01c.09 1.7 1.36 2.66 2.89 2.97V19h2.34v-1.67c1.52-.29 2.72-1.16 2.73-2.77-.01-2.2-1.9-2.96-3.66-3.42z"/></svg>
                    Fondo Actual: Robuxs
                </h3>
                
                <div class="bg-zinc-950 border-2 border-yellow-600/40 rounded-xl p-5 sm:p-6 flex items-center justify-between shadow-[0_0_30px_rgba(234,179,8,0.05)]">
                    <span id="bank-robux-amount" class="text-5xl sm:text-6xl font-black text-yellow-500 tracking-tighter glow-gold">150</span>
                    <img src="../robux.png" alt="Robux Icon" class="w-14 h-14 sm:w-16 sm:h-16 object-contain drop-shadow-[0_0_15px_rgba(234,179,8,0.5)] transform hover:scale-110 transition-transform duration-300" onerror="this.onerror=null; this.src='https://raw.githubusercontent.com/SawFuntime/Proyecto-Sawer/main/robuxs.png';">
                </div>
            </div>
        </div>

    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, offset: 50 });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Misma configuración de tu página principal
        const firebaseConfig = {
            apiKey: "AIzaSyDr_IscODIrscMWwoyEogJ56kNUo2VK3Ac",
            authDomain: "proyecto-sawer.firebaseapp.com",
            projectId: "proyecto-sawer",
            storageBucket: "proyecto-sawer.firebasestorage.app",
            messagingSenderId: "770496172923",
            appId: "1:770496172923:web:79782a0ddbdca6561e23de"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Si el usuario está logueado, buscamos sus datos en la base de datos
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        // Si no ha vinculado su cuenta de Roblox, lo devolvemos al inicio por seguridad
                        if(!data.isLinked) {
                            window.location.href = '../';
                            return;
                        }

                        // 1. Ponemos su nombre real de Roblox
                        const nameEl = document.getElementById('bank-user-name');
                        if(nameEl) nameEl.innerText = data.robloxUsername || "Usuario";

                        // 2. Traemos su foto de perfil directamente desde los servidores de Roblox
                        if (data.robloxUserId) {
                            fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${data.robloxUserId}&size=420x420&format=Png&isCircular=false`)
                                .then(res => res.json())
                                .then(json => {
                                    if (json && json.data && json.data.length > 0 && json.data[0].imageUrl) {
                                        document.getElementById('bank-user-avatar').src = json.data[0].imageUrl;
                                    }
                                }).catch(e => console.log("Aviso: Falló la carga del avatar"));
                        }
                    }
                });
            } else {
                // Si alguien intenta entrar a la página sin iniciar sesión, lo devuelve a la página principal
                window.location.href = '../';
            }
        });
    </script>
</body>
</html>
