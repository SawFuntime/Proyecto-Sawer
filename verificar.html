<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Correo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2a2a2a;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h2>¡Ya casi estamos!</h2>
        <p id="mensaje">Haz clic en el botón para confirmar tu correo y activar tu cuenta.</p>
        <button id="btn-verificar">Verificar mi correo</button>
    </div>

    <script type="module">
        // Reemplaza esto con tu configuración real de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.x.x/firebase-app.js";
        import { getAuth, applyActionCode } from "https://www.gstatic.com/firebasejs/10.x.x/firebase-auth.js";

        const firebaseConfig = {
            // TUS CREDENCIALES AQUÍ
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const btnVerificar = document.getElementById('btn-verificar');
        const mensaje = document.getElementById('mensaje');

        btnVerificar.addEventListener('click', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const actionCode = urlParams.get('oobCode');

            if (!actionCode) {
                mensaje.innerText = "Error: El enlace está incompleto.";
                return;
            }

            btnVerificar.disabled = true;
            btnVerificar.innerText = "Verificando...";

            applyActionCode(auth, actionCode)
                .then(() => {
                    mensaje.innerText = "¡Cuenta verificada con éxito! Ya puedes iniciar sesión.";
                    btnVerificar.style.display = 'none';
                    
                    // Redirigir al perfil después de 3 segundos
                    setTimeout(() => {
                        window.location.href = "perfil.html"; // O la ruta a tu sistema de perfiles
                    }, 3000);
                })
                .catch((error) => {
                    console.error("Error validando el código:", error);
                    mensaje.innerText = "El enlace ya expiró o es inválido. Por favor, solicita uno nuevo en la web.";
                    btnVerificar.disabled = false;
                    btnVerificar.innerText = "Intentar de nuevo";
                });
        });
    </script>
</body>
</html>
